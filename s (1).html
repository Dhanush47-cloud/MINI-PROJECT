 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Symptoms - MediTech</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fa; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .container { background: white; padding: 30px 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
    h2 { color: #34495e; }
    input[type=text], input[type=number] { width: 100%; padding: 12px 15px; margin-top: 10px; margin-bottom: 20px; border-radius: 8px; border: 1.5px solid #d1d9e6; font-size: 15px; }
    select { width: 100%; padding: 12px 15px; margin-bottom: 20px; border-radius: 8px; border: 1.5px solid #d1d9e6; font-size: 15px; }
    button { width: 100%; padding: 14px 0; border: none; border-radius: 12px; background: #3498db; color: white; font-size: 17px; font-weight: 700; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #2980b9; }
    #result { margin-top: 20px; font-weight: bold; color: #27ae60; }
    .question { margin-bottom: 15px; }
  </style>
</head>
<body>

<div class="container">
  <h2>Enter Your Symptoms</h2>
  <input type="text" id="symptomsInput" placeholder="e.g., fever, headache" />
  <button id="submitBtn">Submit</button>
  <div id="result"></div>
  <div id="questionBox"></div>
  <button id="submitAnswersBtn" style="display:none; margin-top:10px;">Submit Answers</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAouRcoDjAVMNZmUkePlzNxUHD6DXxbxco",
    authDomain: "meditech-83cbc.firebaseapp.com",
    projectId: "meditech-83cbc",
    storageBucket: "meditech-83cbc.appspot.com",
    messagingSenderId: "687068515209",
    appId: "1:687068515209:web:c4d007ce8abfc4fcb76f58",
    measurementId: "G-3RY3F1152F"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentQuestions = [];
  let currentPatientId = null;  // ✅ added

  async function submitSymptoms() {
    const symptoms = document.getElementById("symptomsInput").value.trim();
    if (!symptoms) { alert("Please enter your symptoms."); return; }

    try {
      const response = await fetch("http://127.0.0.1:5000/predict_department", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ symptoms })
      });
      const data = await response.json();
      console.log("Received from Flask:", data);

      if (data.department) {
        document.getElementById("result").textContent = "Predicted Department: " + data.department;

        // Render follow-up questions
        renderQuestions(data.questions);

        currentQuestions = data.questions;
        currentPatientId = data.patient_id;  // ✅ store the patient ID for answer saving

        if (data.questions.length > 0) {
          document.getElementById("submitAnswersBtn").style.display = "block";
        }

        // Save department + symptoms to Firebase
        const user = auth.currentUser;
        if (user) {
          await setDoc(doc(db, "patients", user.uid), {
            symptoms,
            department: data.department,
            timestamp: new Date()
          }, { merge: true });
        }
      } else {
        alert("Error predicting department.");
      }

    } catch (err) {
      console.error(err);
      alert("Error connecting to server. Make sure Flask API is running and CORS is enabled.");
    }
  }

  function renderQuestions(questions) {
    const container = document.getElementById("questionBox");
    container.innerHTML = "";
    questions.forEach(q => {
      const div = document.createElement("div");
      div.className = "question";
      if (q.type === "single_choice" && q.choices) {
        let options = q.choices.map(opt => `<option value="${opt}">${opt}</option>`).join("");
        div.innerHTML = `<label>${q.q}</label><select data-id="${q.id}">${options}</select>`;
      } else {
        div.innerHTML = `<label>${q.q}</label><input type="${q.type === "number" ? "number" : "text"}" data-id="${q.id}" />`;
      }
      container.appendChild(div);
    });
  }

  async function submitAnswers() {
    const answerInputs = document.querySelectorAll("[data-id]");
    const answers = {};

    answerInputs.forEach(el => {
      answers[el.dataset.id] = el.value;
    });

    console.log("Collected Answers:", answers);

    // ✅ Send to Flask to update the patient file
    if (currentPatientId) {
      try {
        const res = await fetch("http://127.0.0.1:5000/save_answers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            patient_id: currentPatientId,
            answers: answers
          })
        });
        const result = await res.json();
        console.log("Saved to Flask:", result);
        alert("Answers saved to patient record successfully!");
      } catch (err) {
        console.error("Error saving answers:", err);
        alert("Could not save answers to Flask.");
      }
    }

    // ✅ Also store in Firebase as before
    const user = auth.currentUser;
    if (user) {
      await setDoc(doc(db, "patients", user.uid), { answers, timestamp: new Date() }, { merge: true });
    }
  }

  document.getElementById("submitBtn").addEventListener("click", submitSymptoms);
  document.getElementById("submitAnswersBtn").addEventListener("click", submitAnswers);

</script>

</body>
</html>
